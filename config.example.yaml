# ═══════════════════════════════════════════════════════════════
# Easy Proxies 完整配置文件
# ═══════════════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────────────
# 运行模式
# ───────────────────────────────────────────────────────────────
# pool: 单端口代理池，所有节点共享一个端口，自动负载均衡
# multi-port: 多端口模式，每个节点独立端口
# hybrid: 混合模式，同时启用 pool + multi-port
mode: pool

# 日志级别: debug, info, warn, error
log_level: info

# ───────────────────────────────────────────────────────────────
# 日志轮转配置
# ───────────────────────────────────────────────────────────────
# output: "stdout"（仅控制台）或 "file"（控制台+文件轮转），默认 stdout
# file: 日志文件路径，默认 logs/easy_proxies.log
# max_size: 单个日志文件最大 MB，超出后自动轮转，默认 50
# max_backups: 保留旧日志文件个数，默认 3
# max_age: 保留旧日志文件天数，默认 7
# compress: 是否压缩轮转后的旧日志，默认 false
log:
  output: stdout
  file: logs/easy_proxies.log
  max_size: 50
  max_backups: 3
  max_age: 7
  compress: false

# 全局跳过 SSL 证书验证（默认 false，不建议在生产环境启用）
skip_cert_verify: false

# 可选：节点出站前置代理。用于当前机器无法直连节点入口时，让 VLESS/VMess/AnyTLS 等 TCP 出站通过 SOCKS/HTTP 代理拨号。
# 示例：upstream_proxy: socks5://127.0.0.1:7890
upstream_proxy: ""

# 外部 IP 地址，用于导出配置时替换 0.0.0.0（可选）
# external_ip: "your.public.ip"

# ───────────────────────────────────────────────────────────────
# 监听配置（Pool 模式入口，支持 HTTP/SOCKS5）
# ───────────────────────────────────────────────────────────────
listener:
  address: 0.0.0.0      # 监听地址
  port: 2323            # 监听端口
  username: username    # 代理认证用户名
  password: password    # 代理认证密码

# ───────────────────────────────────────────────────────────────
# 代理池配置
# ───────────────────────────────────────────────────────────────
pool:
  # 调度模式: sequential（顺序）, random（随机）, balance（均衡）
  mode: sequential
  # 连续失败多少次后加入黑名单
  failure_threshold: 3
  # 黑名单持续时间
  blacklist_duration: 24h

# ───────────────────────────────────────────────────────────────
# 多端口模式配置（multi-port / hybrid 模式使用）
# ───────────────────────────────────────────────────────────────
multi_port:
  address: 0.0.0.0      # 监听地址
  base_port: 24000      # 起始端口号
  username: mpuser      # 默认认证用户名
  password: mppass      # 默认认证密码

# ───────────────────────────────────────────────────────────────
# 管理面板配置
# ───────────────────────────────────────────────────────────────
management:
  enabled: true                                      # 是否启用管理面板
  listen: 0.0.0.0:9091                               # 监听地址
  clash_api_listen: 127.0.0.1:9092                   # sing-box Clash API 地址；隔离测试可改高端口
  probe_target: http://cp.cloudflare.com/generate_204  # 健康检查目标
  password: ""                                       # WebUI 访问密码，为空则不需要密码

# ───────────────────────────────────────────────────────────────
# DNS 配置（用于节点域名解析，尤其是 VMess）
# ───────────────────────────────────────────────────────────────
dns:
  server: 223.5.5.5         # DNS 服务器地址
  fallback_servers:          # DNS 解析失败时的备用服务器（主 DNS 为国内 DNS 时自动添加）
    - 8.8.8.8               # Google DNS
    - 1.1.1.1               # Cloudflare DNS
  port: 53                  # DNS 端口
  strategy: prefer_ipv4     # as_is / prefer_ipv4 / prefer_ipv6 / ipv4_only / ipv6_only

# ───────────────────────────────────────────────────────────────
# GeoIP 地域分区配置（可选）
# ───────────────────────────────────────────────────────────────
# 启用后会为节点打上地域标签（jp/kr/us/hk/tw/other），用于 WebUI 统计和筛选。
geoip:
  enabled: true                      # 是否启用 GeoIP 地域标记
  database_path: "./GeoLite2-Country.mmdb"           # GeoIP 数据库路径（首次启动时自动下载）
  auto_update_enabled: true                          # 是否启用自动更新数据库（推荐）
  auto_update_interval: 24h                          # 自动更新间隔（默认 24 小时）
  # 注意：
  #   - 首次启动会自动从 GitHub 下载 GeoIP 数据库（约 9MB）
  #   - 启用 auto_update_enabled 后，数据库会定期自动更新，无需重启容器
  #   - 更新过程采用热重载，不会中断现有连接

# ───────────────────────────────────────────────────────────────
# 订阅自动刷新配置（可选）
# ───────────────────────────────────────────────────────────────
# subscription_refresh:
#   enabled: false              # 是否启用定时刷新
#   interval: 1h                # 刷新间隔（默认 1 小时）
#   timeout: 30s                # 获取订阅的超时时间
#   health_check_timeout: 60s   # 新节点健康检查超时
#   drain_timeout: 30s          # 旧实例排空超时时间
#   min_available_nodes: 1      # 最少可用节点数，低于此值不切换

# ───────────────────────────────────────────────────────────────
# 节点质量定时检测（可选）
# ───────────────────────────────────────────────────────────────
# quality_check:
#   enabled: false              # 是否启用定时检测
#   interval: 24h               # 检测间隔
#   region: all                 # all / us / jp / hk / sg / de / gb 等
#   count: 500                  # 单次检测节点数量，最大 500
#   include_unavailable: true   # 是否包含当前不可用节点
#   retry_failed: false         # 是否优先重试上次失败的 CF 节点

# ═══════════════════════════════════════════════════════════════
# 节点配置方式（三选一或混合使用）
# ═══════════════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────────────
# 方式 1: 订阅链接（推荐，自动获取并写入 nodes.txt）
# ───────────────────────────────────────────────────────────────
# subscriptions:
#   - "https://example.com/subscribe?token=xxx"
#   - "https://another.com/api/v1/client/subscribe?token=yyy"

# ───────────────────────────────────────────────────────────────
# 方式 2: 节点文件（每行一个代理 URI）
# ───────────────────────────────────────────────────────────────
# nodes_file: nodes.txt

# ───────────────────────────────────────────────────────────────
# 方式 3: 免费代理源（启动时加载，运行时来源，不写回 nodes.txt）
# 默认每个免费源全量下载/解析；0 表示候选和最终入池都不额外截断。
# ───────────────────────────────────────────────────────────────
# free_proxy_max_nodes: 0     # 0 表示不限制最终入池；正数才限制最终激活数量
# free_proxy_cache:
#   enabled: true              # 启动/reload 只读本地缓存，不阻塞 WebUI
#   path: .cache/free-proxies.txt
#   refresh_on_start: true     # 启动后后台下载/筛选免费源并更新缓存
#   auto_reload: true          # 缓存更新后自动 reload，让通过筛选的节点入池
#   workers: 4                 # 源下载并发，不是代理探针并发
#   max_age: 6h
# free_proxy_filter:
#   enabled: true              # 添加源后先自动筛选，通过后才进入运行节点
#   min_tier: simple_web       # http_basic 或 simple_web；推荐 simple_web
#   workers: 200               # 最大 800，会使用有界 worker 队列
#   timeout: 2s
#   max_candidates: 0          # 每次最多预筛多少候选；0 表示全量候选
#   probes:
#     http: http://cp.cloudflare.com/generate_204
#     https: https://example.com/
# free_proxy_sources:
#   # 文本格式：每行一个 host:port 或完整 http/socks URI
#   - name: "local-free-list"
#     file: free-proxies.txt
#     format: txt
#     enabled: true
#     max_nodes: 0              # 0 表示全量解析该源；正数才限制单源数量
#     max_bytes: 2097152
#
#   # 简单 JSON 格式：支持 [{"ip":"1.2.3.4","port":8080,"protocol":"http"}]
#   - name: "remote-json-list"
#     url: "https://example.com/free-proxies.json"
#     format: json
#     timeout: 15s
#     enabled: false
#     max_nodes: 0              # 0 表示全量解析该源；正数才限制单源数量
#     max_bytes: 2097152

# ───────────────────────────────────────────────────────────────
# 方式 4: 直接在配置文件中配置节点
# ───────────────────────────────────────────────────────────────
nodes:
  # 最简配置：只需 URI，名称从 # 后自动提取
  - uri: "vless://uuid@server:443?security=tls&type=ws&path=/path#节点名称"

  # 完整配置：手动指定名称和端口
  # - name: "自定义名称"
  #   uri: "ss://base64@server:8388"
  #   port: 24001              # 手动指定端口（multi-port/hybrid 模式）
  #   username: "custom_user"  # 覆盖默认认证（可选）
  #   password: "custom_pass"

# ───────────────────────────────────────────────────────────────
# 支持的代理协议
# ───────────────────────────────────────────────────────────────
# - VMess:    vmess://base64_encoded_json
# - VLESS:    vless://uuid@server:port?params#name
# - Trojan:   trojan://password@server:port?params#name
# - SS:       ss://method:password@server:port#name
#             ss://base64(method:password)@server:port#name
# - Hysteria2: hy2://password@server:port?params#name
# - SOCKS5:  socks5://[user:pass@]server:port#name
# - HTTP:    http://[user:pass@]server:port#name
#            https://[user:pass@]server:port#name
# 注意：解析器可识别部分额外协议前缀（如 ssr://、hysteria://），
# 但当前内核实际构建仅支持以上 7 类，其他会被跳过并输出日志。
